############################# Filebeat Configuration #############################

# Collect Linux system logs and SSH authentication logs

filebeat.inputs:
  - type: filestream
    id: my-filestream-id
    enabled: true

    paths:
      - /var/log/syslog
      - /var/log/auth.log


############################# Filebeat Modules #############################

filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  reload.enabled: false


############################# Index Template #############################

setup.template.settings:
  index.number_of_shards: 1


############################# Kibana #############################

setup.kibana:
  host: "localhost:5601"


############################# Elasticsearch Output #############################

output.elasticsearch:
  hosts:
    - "http://localhost:9200"

  preset: balanced


############################# Metadata Processors #############################

processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded

  - add_cloud_metadata: ~

  - add_docker_metadata: ~

  - add_kubernetes_metadata: ~


############################# Monitoring #############################

monitoring.enabled: false


############################# Instrumentation #############################

instrumentation:
  enabled: false